  prometheus:
    image: prom/prometheus:latest
    container_name: template-prometheus
    restart: unless-stopped
    volumes:
      - ../observability-stack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '9090:9090'
    networks:
      - template-network

  loki:
    image: grafana/loki:latest
    container_name: template-loki
    restart: unless-stopped
    volumes:
      - ../observability-stack/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - '3100:3100'
    networks:
      - template-network

  grafana:
    image: grafana/grafana:latest
    container_name: template-grafana
    restart: unless-stopped
    volumes:
      - ../observability-stack/provisioning:/etc/grafana/provisioning:ro
      - ../observability-stack/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - '3001:3000'
    networks:
      - template-network
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  template-network:
    external: true