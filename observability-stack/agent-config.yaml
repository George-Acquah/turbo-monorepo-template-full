server:
  log_level: info
  log_format: json

metrics:
  global:
    scrape_interval: 15s
    external_labels:
      app: template
      environment: development
      cluster: local

  configs:
    - name: default
      scrape_configs:
        - job_name: template-api
          metrics_path: /api/metrics
          scrape_interval: 15s
          scrape_timeout: 10s
          static_configs:
            - targets: ['template-api-dev:3000']